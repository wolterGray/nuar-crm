name: Visit SMS reminders cron

on:
  schedule:
    # Every 15 minutes; edge function sends only reminders inside 24h/2h windows.
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Invoke visit-sms-reminders
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VISIT_SMS_CRON_SECRET: ${{ secrets.VISIT_SMS_CRON_SECRET }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "::error::Add GitHub repository secrets SUPABASE_URL and SUPABASE_SERVICE_ROLE_KEY (Settings → Secrets and variables → Actions)."
            exit 1
          fi

          curl_args=(
            -sS
            -w "\n%{http_code}"
            -X POST
            "${SUPABASE_URL%/}/functions/v1/visit-sms-reminders"
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}"
            -H "Content-Type: application/json"
            -d '{"action":"cron"}'
          )

          if [ -n "${VISIT_SMS_CRON_SECRET:-}" ]; then
            curl_args+=(-H "x-cron-secret: ${VISIT_SMS_CRON_SECRET}")
          fi

          response="$(curl "${curl_args[@]}")"
          body="${response%$'\n'*}"
          status="${response##*$'\n'}"

          echo "HTTP ${status}"
          echo "${body}"

          if [ "${status}" -lt 200 ] || [ "${status}" -ge 300 ]; then
            echo "::error::visit-sms-reminders returned HTTP ${status}. Check Supabase secrets: CRM_OWNER_USER_ID and SMSAPI_TOKEN."
            exit 1
          fi

          if command -v jq >/dev/null 2>&1; then
            configured="$(echo "${body}" | jq -r '.configured // false')"
            sent_count="$(echo "${body}" | jq -r '(.sent // []) | length')"
            failed_count="$(echo "${body}" | jq -r '(.failed // []) | length')"
            due_count="$(echo "${body}" | jq -r '(.due // []) | length')"

            if [ "${configured}" != "true" ]; then
              echo "::error::SMSAPI_TOKEN is not configured in Supabase Edge Functions secrets."
              exit 1
            fi

            if [ "${failed_count}" -gt 0 ]; then
              echo "::error::SMS reminders failed: ${failed_count} failed, ${sent_count} sent."
              exit 1
            fi

            echo "SMS reminders processed: ${sent_count} sent, ${due_count} due."
          fi

          echo "Cron invocation completed."
