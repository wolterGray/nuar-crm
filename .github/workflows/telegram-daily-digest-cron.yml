name: Telegram daily digest cron

on:
  schedule:
    # Every hour UTC; edge function sends only in the 08:00 ±15 min Warsaw window.
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Invoke telegram-daily-digest
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_DIGEST_CRON_SECRET: ${{ secrets.TELEGRAM_DIGEST_CRON_SECRET }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "::error::Add GitHub repository secrets SUPABASE_URL and SUPABASE_SERVICE_ROLE_KEY (Settings → Secrets and variables → Actions)."
            exit 1
          fi

          curl_args=(
            -sS
            -w "\n%{http_code}"
            -X POST
            "${SUPABASE_URL%/}/functions/v1/telegram-daily-digest"
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}"
            -H "Content-Type: application/json"
            -d '{"action":"cron"}'
          )

          if [ -n "${TELEGRAM_DIGEST_CRON_SECRET:-}" ]; then
            curl_args+=(-H "x-cron-secret: ${TELEGRAM_DIGEST_CRON_SECRET}")
          fi

          response="$(curl "${curl_args[@]}")"
          body="${response%$'\n'*}"
          status="${response##*$'\n'}"

          echo "HTTP ${status}"
          echo "${body}"

          if [ "${status}" -lt 200 ] || [ "${status}" -ge 300 ]; then
            echo "::error::telegram-daily-digest returned HTTP ${status}. Check Supabase secrets: CRM_OWNER_USER_ID, TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID."
            exit 1
          fi

          if command -v jq >/dev/null 2>&1; then
            skipped="$(echo "${body}" | jq -r '.skipped // false')"
            sent="$(echo "${body}" | jq -r '.sent // false')"
            reason="$(echo "${body}" | jq -r '.reason // empty')"
            error_msg="$(echo "${body}" | jq -r '.error // empty')"

            if [ "${skipped}" = "true" ]; then
              echo "Digest skipped (${reason:-no reason}) — cron OK."
              exit 0
            fi

            if [ "${sent}" = "true" ]; then
              echo "Digest sent (${reason:-scheduled})."
              exit 0
            fi

            if [ -n "${error_msg}" ]; then
              echo "::error::Digest not sent: ${error_msg}"
              exit 1
            fi
          fi

          echo "Cron invocation completed."
